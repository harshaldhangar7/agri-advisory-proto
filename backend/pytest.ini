[pytest]
# Pytest configuration for Agri Advisory Backend Tests

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Markers for test categorization
markers =
    unit: Unit tests
    integration: Integration tests
    security: Security-focused tests
    performance: Performance baseline tests
    slow: Tests that take longer to run

# Coverage options
[coverage:run]
source = app
omit = app/db.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
